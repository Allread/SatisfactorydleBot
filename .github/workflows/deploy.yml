name: Deploy Python Bot

on:
  push:
    branches:
      - refacto_python
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/satisfactorydle-bot

jobs:
  ci:
    name: Lint and tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Lint
        run: ruff check app tests

      - name: Run tests
        run: pytest -q

  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy to VPS via SSH
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/refacto_python'
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
            docker pull ${{ env.IMAGE_NAME }}:latest
            docker stop satisfactorydle-bot || true
            docker rm satisfactorydle-bot || true
            docker run -d --name satisfactorydle-bot --restart unless-stopped \
              -e DISCORD_TOKEN='${{ secrets.DISCORD_TOKEN }}' \
              -e API_URL='${{ secrets.API_URL }}' \
              -e API_TOKEN='${{ secrets.API_TOKEN }}' \
              -e DEFAULT_LOCALE='${{ secrets.DEFAULT_LOCALE }}' \
              -e SQLITE_PATH='/data/sfdle.db' \
              -v /opt/satisfactorydle-bot/data:/data \
              ${{ env.IMAGE_NAME }}:latest
